{% extends "base.html" %}
{% block title %}Stock Analyzer{% endblock title %}

{% block body %}
    <!-- Main Content -->
    <main class="col-md-10 p-4">

      <!-- Search -->
      <div class="mb-4">
        <input type="text" class="form-control bg-dark text-white border-0"
               placeholder="Search Stock (e.g. TCS, RELIANCE, AAPL)">
      </div>

      <!-- Cards -->
      <div class="row mb-4">

        <div class="col-md-4">
          <div class="card p-3">
            <h6>Stock Price</h6>
            <h3 class="text-success">₹1,245</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h6>Market Volume</h6>
            <h3>3.2M</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h6>Trend</h6>
            <h3 class="text-warning">UP 📈</h3>
          </div>
        </div>

      </div>

      <!-- Chart -->
      <div class="card p-3 mb-4">
        <h5>Stock Price Chart</h5>
        <canvas id="myChart" height="100"></canvas>
      </div>

      <!-- Table -->
      <div class="card p-3">
        <h5>Recent Data</h5>
        <table class="table table-dark table-striped">
          <thead>
            <tr>
              <th>Date</th>
              <th>Open</th>
              <th>Close</th>
              <th>High</th>
              <th>Low</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>01 Apr</td>
              <td>1200</td>
              <td>1245</td>
              <td>1250</td>
              <td>1190</td>
            </tr>
            <tr>
              <td>02 Apr</td>
              <td>1245</td>
              <td>1220</td>
              <td>1260</td>
              <td>1210</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>

  </div>
</div>

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
      datasets: [{
        label: 'Stock Price',
        data: [1200, 1250, 1230, 1280, 1300],
        borderColor: '#38bdf8',
        tension: 0.4
      }]
    }
  });
</script>

{% endblock body %}
